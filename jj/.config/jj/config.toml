# jujutsu (jj) — global config. Sandbox lives in ~/dotfiles (colocated: shares
# the real .git, so git keeps working). Try: `jj log`, `jj st`, or `jjui`.
# NOTE: this identity is the personal/dotfiles one; for work repos set a per-repo
# email with `jj config set --repo user.email <work-email>`.
[user]
name = "Pedro Coutinho"
email = "pmd.coutinho@gmail.com"

[ui]
default-command = "log"

# Sign own commits with the same "@Github" ed25519 key as git (KeePassXC serves
# it via the ssh-agent user unit) — keeps colocated repos consistent with
# git's commit.gpgsign.
[signing]
behavior = "own"
backend = "ssh"
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK8YxI4GHkNBE0ZLNzZC3rFU/1s6GxRjcsXoau5WjoPN"
