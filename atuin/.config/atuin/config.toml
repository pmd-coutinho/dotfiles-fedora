# atuin — local-only history (no sync)
auto_sync = false
update_check = false
sync_address = ""

style = "compact"
inline_height = 16
invert = false

search_mode = "fuzzy"
filter_mode = "global"
# Up-arrow filters by current directory (Ctrl-R stays global) — directory-scoped
# recall is what you usually want when retyping a command for this project.
filter_mode_shell_up_key_binding = "directory"

# Selecting a history entry puts it on the prompt to edit/confirm, instead of
# running it immediately — safer for destructive commands.
enter_accept = false
