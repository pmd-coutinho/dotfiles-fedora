# Walker — Catppuccin Mocha
# Backend providers come from the elephant daemon (systemd --user service).
theme = "catppuccin"

# Centered floating window (not full-screen anchored).
layer = "overlay"

# Installed providers (elephant listproviders): desktopapplications,
# websearch, runner, clipboard, symbols, unicode, nirisessions, todo.
# calc lives in a separate elephant-calc package — add it here once
# installed.
[providers]
default = ["desktopapplications", "websearch", "runner"]
empty = ["desktopapplications"]

[placeholders]
"default" = { input = "Search…", list = "No results" }
